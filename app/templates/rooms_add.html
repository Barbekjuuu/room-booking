<!-- app/templates/rooms_add.html -->
{% extends "base.html" %}

{% block content %}
<h2>Dodaj nową salę</h2>

<form method="POST" class="mt-3">
    <div class="mb-3">
        <label class="form-label">Nazwa sali</label>
        <input type="text" name="name" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Pojemność (liczba osób)</label>
        <input type="number" name="capacity" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Piętro</label>
        <input type="number" name="floor" class="form-control" value="0">
    </div>

    <div class="mb-3">
        <label class="form-label">Cena za godzinę (zł)</label>
        <input type="number" step="0.01" name="hourly_rate" class="form-control" value="0">
    </div>

    <div class="mb-3">
        <label class="form-label">Opis sali</label>
        <textarea name="description" class="form-control" rows="3"></textarea>
    </div>

    <button type="submit" class="btn btn-success">Zapisz salę</button>
    <a href="{{ url_for('rooms.index') }}" class="btn btn-secondary">Anuluj</a>
</form>
{% endblock %}
